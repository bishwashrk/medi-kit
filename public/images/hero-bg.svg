<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="50%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="white" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="1200" height="600" fill="url(#heroGrad)"/>
  <rect width="1200" height="600" fill="url(#grid)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="white" opacity="0.05"/>
  <circle cx="1100" cy="500" r="120" fill="white" opacity="0.05"/>
  <circle cx="900" cy="150" r="60" fill="white" opacity="0.05"/>
  
  <!-- Hospital icon -->
  <g transform="translate(850, 200)">
    <rect x="0" y="40" width="200" height="160" rx="8" fill="white" opacity="0.15"/>
    <rect x="80" y="0" width="40" height="40" fill="white" opacity="0.2"/>
    <rect x="20" y="70" width="40" height="50" rx="4" fill="white" opacity="0.2"/>
    <rect x="80" y="70" width="40" height="50" rx="4" fill="white" opacity="0.2"/>
    <rect x="140" y="70" width="40" height="50" rx="4" fill="white" opacity="0.2"/>
    <rect x="70" y="140" width="60" height="60" rx="4" fill="white" opacity="0.25"/>
  </g>
  
  <!-- Stethoscope icon -->
  <g transform="translate(150, 350)">
    <circle cx="50" cy="50" r="40" fill="white" opacity="0.1"/>
    <path d="M30 30 C30 70, 70 70, 70 30" stroke="white" stroke-width="4" fill="none" opacity="0.3"/>
    <circle cx="30" cy="25" r="8" fill="white" opacity="0.3"/>
    <circle cx="70" cy="25" r="8" fill="white" opacity="0.3"/>
    <circle cx="50" cy="80" r="15" fill="white" opacity="0.3"/>
  </g>
</svg>
